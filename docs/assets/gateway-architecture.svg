<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 470" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .canvas{fill:#ffffff;stroke:#e2e8f0}
    .edge{fill:none;stroke:#64748b;stroke-width:1.6}
    .arrowhead{fill:#64748b}
    .lbl{font-size:11.5px;font-style:italic;fill:#475569;stroke:#ffffff;stroke-width:4px;paint-order:stroke;stroke-linejoin:round}
    .node{fill:#f1f5f9;stroke:#475569;stroke-width:1.6}
    .nodeTxt{fill:#0f172a}.nodeSub{fill:#64748b}
    .lb{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.6}
    .lbTxt{fill:#334155}.lbSub{fill:#64748b}
    .gw{fill:#ccfbf1;stroke:#0d9488;stroke-width:2.2}
    .gwTxt{fill:#134e4a}.gwSub{fill:#0f766e}
    .cylBody{fill:#f1f5f9;stroke:#94a3b8;stroke-width:1.6}
    .cylTop{fill:#e2e8f0;stroke:#94a3b8;stroke-width:1.6}
    .cylTxt{fill:#334155}.cylSub{fill:#64748b}
    .grn{fill:#ecfdf5;stroke:#10b981;stroke-width:1.8}
    .grnTxt{fill:#065f46}.grnSub{fill:#047857}
    .blu{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.8}
    .bluTxt{fill:#1e40af}.bluSub{fill:#1d4ed8}
    .pur{fill:#f5f3ff;stroke:#8b5cf6;stroke-width:1.8}
    .purTxt{fill:#5b21b6}.purSub{fill:#6d28d9}
    .amb{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.8}
    .ambTxt{fill:#92400e}.ambSub{fill:#b45309}
    @media (prefers-color-scheme: dark){
      .canvas{fill:#0d1117;stroke:#30363d}
      .edge{stroke:#8b949e}
      .arrowhead{fill:#8b949e}
      .lbl{fill:#8b949e;stroke:#0d1117}
      .node{fill:#21262d;stroke:#8b949e}
      .nodeTxt{fill:#e6edf3}.nodeSub{fill:#8b949e}
      .lb{fill:#161b22;stroke:#6e7681}
      .lbTxt{fill:#c9d1d9}.lbSub{fill:#8b949e}
      .gw{fill:#04302c;stroke:#2dd4bf}
      .gwTxt{fill:#7ee8dc}.gwSub{fill:#5eead4}
      .cylBody{fill:#161b22;stroke:#8b949e}
      .cylTop{fill:#21262d;stroke:#8b949e}
      .cylTxt{fill:#c9d1d9}.cylSub{fill:#8b949e}
      .grn{fill:#0b2e1f;stroke:#2ea043}
      .grnTxt{fill:#7ee787}.grnSub{fill:#56d364}
      .blu{fill:#0c2038;stroke:#388bfd}
      .bluTxt{fill:#79c0ff}.bluSub{fill:#58a6ff}
      .pur{fill:#211a35;stroke:#a371f7}
      .purTxt{fill:#d2a8ff}.purSub{fill:#bc8cff}
      .amb{fill:#341a00;stroke:#d29922}
      .ambTxt{fill:#f2cc60}.ambSub{fill:#e3b341}
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="arrowhead"/>
    </marker>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1140" height="470" rx="14" class="canvas"/>

  <!-- dev -->
  <rect x="25" y="195" width="195" height="90" rx="10" class="node" filter="url(#ds)"/>
  <text x="122" y="233" text-anchor="middle" font-size="13.5" font-weight="700" class="nodeTxt">Dev IDEs &amp; agents</text>
  <text x="122" y="256" text-anchor="middle" font-size="11.5" class="nodeSub">one URL for everything</text>

  <!-- LB -->
  <rect x="285" y="195" width="165" height="90" rx="10" class="lb" filter="url(#ds)"/>
  <text x="367" y="233" text-anchor="middle" font-size="13.5" font-weight="700" class="lbTxt">Ingress / TLS</text>
  <text x="367" y="256" text-anchor="middle" font-size="11.5" class="lbSub">load balancer</text>

  <!-- gateway -->
  <rect x="515" y="190" width="200" height="100" rx="10" class="gw" filter="url(#ds)"/>
  <text x="615" y="230" text-anchor="middle" font-size="14.5" font-weight="700" class="gwTxt">LiteLLM proxy ×2</text>
  <text x="615" y="254" text-anchor="middle" font-size="11.5" class="gwSub">routing · quotas · failover</text>

  <!-- postgres cylinder -->
  <path d="M540 358 v57 a75 13 0 0 0 150 0 v-57" class="cylBody"/>
  <ellipse cx="615" cy="358" rx="75" ry="13" class="cylTop"/>
  <text x="615" y="390" text-anchor="middle" font-size="12.5" font-weight="700" class="cylTxt">Postgres</text>
  <text x="615" y="408" text-anchor="middle" font-size="10.5" class="cylSub">keys · budgets · spend logs</text>

  <!-- targets -->
  <rect x="840" y="30" width="270" height="72" rx="10" class="grn" filter="url(#ds)"/>
  <text x="975" y="60" text-anchor="middle" font-size="13" font-weight="700" class="grnTxt">vLLM · qwen2.5-coder-7b</text>
  <text x="975" y="82" text-anchor="middle" font-size="11.5" class="grnSub">completions · commit msgs</text>

  <rect x="840" y="130" width="270" height="72" rx="10" class="blu" filter="url(#ds)"/>
  <text x="975" y="160" text-anchor="middle" font-size="13" font-weight="700" class="bluTxt">vLLM · qwen3-coder-30b</text>
  <text x="975" y="182" text-anchor="middle" font-size="11.5" class="bluSub">chat · code gen · agents</text>

  <rect x="840" y="230" width="270" height="72" rx="10" class="pur" filter="url(#ds)"/>
  <text x="975" y="260" text-anchor="middle" font-size="13" font-weight="700" class="purTxt">Foundry serverless · deepseek-r1</text>
  <text x="975" y="282" text-anchor="middle" font-size="11.5" class="purSub">hard debugging · architecture</text>

  <rect x="840" y="330" width="270" height="72" rx="10" class="amb" filter="url(#ds)"/>
  <text x="975" y="360" text-anchor="middle" font-size="13" font-weight="700" class="ambTxt">Spot replicas / Foundry</text>
  <text x="975" y="382" text-anchor="middle" font-size="11.5" class="ambSub">burst capacity</text>

  <!-- edges -->
  <g class="edge">
    <path d="M220 240 H285" marker-end="url(#arrow)"/>
    <path d="M450 240 H515" marker-end="url(#arrow)"/>
    <path d="M615 290 V345" marker-end="url(#arrow)"/>
    <path d="M715 215 H775 V66 H840" marker-end="url(#arrow)"/>
    <path d="M715 232 H775 V166 H840" marker-end="url(#arrow)"/>
    <path d="M715 249 H775 V266 H840" marker-end="url(#arrow)"/>
    <path d="M715 266 H775 V366 H840" marker-end="url(#arrow)"/>
  </g>

  <!-- edge labels -->
  <g class="lbl" text-anchor="middle">
    <text x="252" y="214">1 URL</text>
    <text x="252" y="228">+ virtual key</text>
    <text x="808" y="60">fast</text>
    <text x="808" y="160">default</text>
    <text x="808" y="260">reasoning</text>
    <text x="808" y="360">overflow</text>
  </g>
</svg>
